name: regression_party_not_overwritten_by_llm
# Real call 2026-05-05 16:34: caller said "на двух человек" — qualifier
# captured party=2 — but the LLM later said "на 8 человек" in the
# confirmation, hallucinating from the date "8 мая". With LLM skipped on
# the completion turn and the deterministic summary used instead, the
# captured party_size of 2 is what the caller hears back.
steps:
  - say: "Я хотел бы забронировать столик на двух человек"
    lang: ru-RU
  - say: "Меня зовут Игорь"
    lang: ru-RU
  - say: "8 мая в восемь вечера"
    lang: ru-RU
expect_intent: reservation
expect_guest_name: Игорь
expect_party_size: 2
expect_reservation_datetime_contains: "-05-08"
expect_qualified: true
