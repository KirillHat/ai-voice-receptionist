[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["data", "venv", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "ASYNC", "SIM"]
ignore = [
    "E501",
    "B008",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]
